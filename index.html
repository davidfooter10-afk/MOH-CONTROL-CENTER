<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOH COFFEE | Command Center Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { 
            --spotify-green: #1DB954; 
            --card-bg: rgba(20, 20, 20, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', 'Noto Sans Ethiopic', sans-serif; 
            color: #fff; background-color: #000;
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1; filter: brightness(0.2) contrast(1.2);
        }

        #app-container {
            min-height: 100vh; padding: 20px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            margin: 0 auto;
        }

        .phone-mode {
            max-width: 400px !important; height: 850px;
            margin: 20px auto !important; border-radius: 40px;
            border: 12px solid #111; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow-y: auto; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
        }

        .glass-panel {
            background: var(--card-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
        }

        .order-card {
            background: rgba(24, 24, 24, 0.7); border-radius: 20px;
            padding: 20px; border: 1px solid var(--glass-border);
            transition: 0.3s ease;
        }
        .order-card:hover { border-color: var(--spotify-green); transform: translateY(-5px); }

        .map-frame { height: 150px; width: 100%; border-radius: 16px; margin: 12px 0; border: 1px solid rgba(255,255,255,0.05); }

        .control-bar {
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 50; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .action-btn {
            background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 99px;
            font-size: 11px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }

        .tab-btn {
            padding: 10px 20px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; border-radius: 99px; cursor: pointer;
        }
        .tab-active { background: var(--spotify-green); color: black; }

        .courier-img, .payment-preview { width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 2px solid var(--spotify-green); cursor: pointer; }

        /* Payment Modal Styling */
        #payment-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            display: none; align-items: center; justify-content: center;
        }

        #calc-app {
            position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 100;
            transform: translateY(150%); opacity: 0; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #calc-app.show { transform: translateY(0); opacity: 1; }
        
        input, select, textarea {
            background: rgba(0,0,0,0.5) !important; border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important; padding: 12px !important; color: white !important;
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-bg">
        <source src="background-video.mp4" type="video/mp4">
    </video>

    <div id="payment-modal" onclick="this.style.display='none'">
        <div class="relative max-w-[90%] max-h-[90%]">
            <img id="modal-img" src="" class="rounded-3xl shadow-2xl border-4 border-[#1DB954]">
            <p class="text-center mt-4 font-black uppercase tracking-widest text-[#1DB954]">Click anywhere to close</p>
        </div>
    </div>

    <div class="control-bar">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-wifi text-xs"></i>
            <span id="clock" class="text-xs font-bold">00:00:00</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDeviceView()" class="action-btn"><i class="fa-solid fa-mobile-screen"></i> <span>VIEW</span></button>
            <button onclick="toggleCalculator()" class="action-btn"><i class="fa-solid fa-calculator"></i> <span>CALC</span></button>
            <button onclick="toggleLanguage()" class="action-btn bg-white text-black"><i class="fa-solid fa-language"></i> <span id="lang-label">EN/አማ</span></button>
        </div>
    </div>

    <div id="app-container" class="max-w-6xl">
        <header class="py-10">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-4xl md:text-5xl font-900 tracking-tighter italic" data-i18n="welcome">WELCOME MOH COFFEE CENTER</h1>
                    <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mt-2" data-i18n="systemLive">● System Live & Secure</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-panel p-4 min-w-[120px] text-center">
                        <p class="text-[9px] font-black text-gray-500 uppercase" data-i18n="revenue">Revenue</p>
                        <span id="sales" class="text-xl font-black text-[#1DB954]">0</span><span class="text-[10px] ml-1">ETB</span>
                    </div>
                    <div class="glass-panel p-4 min-w-[120px] text-center">
                        <p class="text-[9px] font-black text-gray-500 uppercase" data-i18n="orders">Orders</p>
                        <span id="totalOrders" class="text-xl font-black">0</span>
                    </div>
                    <div class="glass-panel p-4 min-w-[120px] text-center">
                        <p class="text-[9px] font-black text-gray-500 uppercase" data-i18n="items">Items Sold</p>
                        <span id="totalItems" class="text-xl font-black text-blue-400">0</span>
                    </div>
                    <div class="glass-panel p-4 min-w-[120px] text-center">
                        <p class="text-[9px] font-black text-gray-500 uppercase" data-i18n="fleet">Fleet</p>
                        <span id="fleetCount" class="text-xl font-black text-orange-400">0</span>
                    </div>
                </div>
            </div>
        </header>

        <nav class="flex gap-4 mb-8 border-b border-white/10 pb-4 overflow-x-auto no-scrollbar">
            <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn tab-active" data-i18n="tabOrders">Orders</button>
            <button onclick="switchTab('fleet')" id="btn-fleet" class="tab-btn text-gray-400" data-i18n="tabFleet">Logistics</button>
            <button onclick="switchTab('freezone')" id="btn-freezone" class="tab-btn text-gray-400" data-i18n="tabFree">Order Log</button>
        </nav>

        <main id="orders-section">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
        </main>

        <main id="fleet-section" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-panel p-8 h-fit">
                    <h2 class="text-xl font-black mb-6 uppercase" data-i18n="regCourier">Hire Courier</h2>
                    <div class="space-y-4">
                        <input type="text" id="fName" placeholder="Full Name" class="w-full">
                        <input type="tel" id="fPhone" placeholder="Phone Number" class="w-full">
                        <select id="fType" class="w-full">
                            <option value="Bicycle">Bicycle (Short Distances)</option>
                            <option value="Motor">Motorbike (Long Distances)</option>
                        </select>
                        <div class="p-4 border border-white/10 rounded-xl">
                            <p class="text-[9px] font-black text-gray-500 mb-2 uppercase">Profile Photo</p>
                            <input type="file" id="fPhoto" accept="image/*" class="text-xs">
                        </div>
                        <button onclick="registerCourier()" class="w-full bg-[#1DB954] text-black py-4 rounded-xl font-black uppercase">Add to Fleet</button>
                    </div>
                </div>
                <div class="lg:col-span-2 glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase" data-i18n="activeFleet">Active Couriers</h2>
                    <div id="fleet-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </main>

        <main id="freezone-section" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase" data-i18n="scratchpad">Manual Order Log</h2>
                    <textarea id="logText" class="w-full h-48 mb-4" placeholder="Write custom orders or notes here..."></textarea>
                    <button onclick="saveLog()" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase">Save Note</button>
                </div>
                <div class="glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase" data-i18n="history">Saved Archive</h2>
                    <div id="log-list" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="calc-app" class="glass-panel p-5">
        <input type="text" id="calc-display" class="w-full bg-black/50 text-right text-2xl p-3 rounded-xl mb-4 font-mono" disabled value="0">
        <div class="grid grid-cols-4 gap-2">
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('7')">7</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('8')">8</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('9')">9</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl" onclick="calcAction('/')">÷</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('4')">4</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('5')">5</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('6')">6</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl" onclick="calcAction('*')">×</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('1')">1</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('2')">2</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('3')">3</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl" onclick="calcAction('-')">-</button>
            <button class="bg-white/10 p-4 rounded-xl" onclick="calcAction('0')">0</button>
            <button class="bg-red-500/20 text-red-500 p-4 rounded-xl" onclick="calcAction('clear')">C</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl" onclick="calcAction('=')">=</button>
            <button class="bg-[#1DB954] text-black font-bold p-4 rounded-xl" onclick="calcAction('+')">+</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjtvENDE6JD2gntFdTMuljt8ojaLyW_lg",
            authDomain: "moh-coffe.firebaseapp.com",
            databaseURL: "https://moh-coffe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "moh-coffe",
            appId: "1:257455436275:web:b6af25bbc61803b7a02286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const MOH_HUB = [8.9865, 38.8340];
        let globalFleet = {};

        // --- AMHARIC ENGINE ---
        let lang = 'en';
        const dict = {
            'en': { welcome: "WELCOME MOH COFFEE CENTER", revenue: "Revenue", orders: "Orders", items: "Items Sold", fleet: "Fleet", tabOrders: "Orders Feed", tabFleet: "Logistics", tabFree: "Order Log", systemLive: "● System Live & Secure", regCourier: "Hire Courier", activeFleet: "Active Fleet", scratchpad: "Scratchpad", history: "History" },
            'am': { welcome: "እንኳን ወደ ሞህ ቡና ማዕከል በደህና መጡ", revenue: "ጠቅላላ ገቢ", orders: "ትዕዛዞች", items: "የተሸጡ", fleet: "አሽከርካሪ", tabOrders: "የትዕዛዝ ዝርዝር", tabFleet: "መጓጓዣ", tabFree: "ማስታወሻ", systemLive: "● ሲስተሙ እየሰራ ነው", regCourier: "አሽከርካሪ ቅጠር", activeFleet: "ንቁ አሽከርካሪዎች", scratchpad: "ማስታወሻ", history: "ታሪክ" }
        };

        window.toggleLanguage = () => {
            lang = lang === 'en' ? 'am' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = dict[lang][el.getAttribute('data-i18n')]);
        };

        // --- PAYMENT VIEWER ---
        window.viewPayment = (imgUrl) => {
            const modal = document.getElementById('payment-modal');
            const modalImg = document.getElementById('modal-img');
            modalImg.src = imgUrl;
            modal.style.display = 'flex';
        };

        // --- UI ACTIONS ---
        window.toggleDeviceView = () => document.getElementById('app-container').classList.toggle('phone-mode');
        window.toggleCalculator = () => document.getElementById('calc-app').classList.toggle('show');
        window.switchTab = (t) => {
            ['orders', 'fleet', 'freezone'].forEach(tab => {
                document.getElementById(`${tab}-section`).classList.toggle('hidden', tab !== t);
                document.getElementById(`btn-${tab}`).className = tab === t ? 'tab-btn tab-active' : 'tab-btn bg-zinc-900 text-gray-400';
            });
        };

        // --- CALCULATOR ---
        let val = "0";
        window.calcAction = (a) => {
            const display = document.getElementById('calc-display');
            if(a === 'clear') val = "0";
            else if(a === '=') try { val = eval(val).toString(); } catch { val = "Error"; }
            else { val = val === "0" ? a : val + a; }
            display.value = val;
        };

        // --- LOGISTICS ---
        window.registerCourier = () => {
            const name = document.getElementById('fName').value;
            const phone = document.getElementById('fPhone').value;
            const type = document.getElementById('fType').value;
            const file = document.getElementById('fPhoto').files[0];

            if(!name || !phone || !file) return alert("Please fill Name, Phone, and Photo");

            const reader = new FileReader();
            reader.onload = () => {
                push(ref(db, 'fleet'), { name, phone, type, photo: reader.result });
                document.getElementById('fName').value = ''; document.getElementById('fPhone').value = '';
            };
            reader.readAsDataURL(file);
        };

        onValue(ref(db, 'fleet'), (s) => {
            const list = document.getElementById('fleet-list'); list.innerHTML = '';
            globalFleet = s.val() || {};
            document.getElementById('fleetCount').innerText = Object.keys(globalFleet).length;
            Object.keys(globalFleet).forEach(id => {
                const f = globalFleet[id];
                list.innerHTML += `<div class="bg-black/40 p-4 rounded-2xl border border-white/5 flex items-center gap-4"><img src="${f.photo}" class="courier-img"><div class="flex-1"><p class="font-black uppercase text-xs">${f.name}</p><p class="text-[9px] text-[#1DB954] font-bold">${f.type}</p></div><button onclick="remove(ref(db, 'fleet/${id}'))" class="text-red-500/20 hover:text-red-500"><i class="fa-solid fa-trash"></i></button></div>`;
            });
        });

        // --- ORDERS & PAYMENT VERIFICATION ---
        onValue(ref(db, 'orders'), (s) => {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            const data = s.val();
            let totalRev = 0; let totalOrd = 0; let totalItms = 0;
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                totalOrd++; totalItms++;
                if(o.status === "Paid" || o.status === "Dispatched") totalRev += Number(o.price);

                const mapId = `map-${id}`;
                // Using placeholder if user didn't upload a receipt yet
                const paymentImg = o.payment_screenshot || 'https://via.placeholder.com/150?text=NO+IMAGE';

                grid.innerHTML += `
                    <div class="order-card">
                        <div class="flex justify-between mb-2">
                            <span class="text-[9px] font-bold px-2 py-1 rounded bg-black/40 border border-[#1DB954] text-[#1DB954] uppercase">${o.status}</span>
                            <span class="text-[9px] text-gray-500">${new Date(o.timestamp || Date.now()).toLocaleTimeString()}</span>
                        </div>
                        <h3 class="text-lg font-black uppercase">${o.item}</h3>
                        <p class="text-[10px] text-gray-400 font-bold mb-3">${o.variant}</p>
                        
                        <div id="${mapId}" class="map-frame"></div>
                        
                        <div class="bg-black/30 p-3 rounded-xl mb-4 border border-white/5 flex items-center justify-between">
                            <div>
                                <p class="text-[10px] text-gray-500 uppercase font-black mb-1">Customer & Payment</p>
                                <p class="text-xs font-bold">${o.customer}</p>
                                <p class="text-[10px] text-blue-400 mt-1 italic"><i class="fa-solid fa-location-dot"></i> ${o.location}</p>
                            </div>
                            <div class="text-center">
                                <img src="${paymentImg}" onclick="viewPayment('${paymentImg}')" class="payment-preview">
                                <p class="text-[8px] font-black mt-1 uppercase text-[#1DB954]">View Proof</p>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mb-4">
                            <div class="text-2xl font-black">${o.price} <small class="text-xs font-bold">ETB</small></div>
                            <select id="assign-${id}" class="text-[9px] font-black uppercase bg-black border border-white/10 p-1 rounded">
                                <option value="">Dispatch...</option>
                                <option value="Bicycle">Bicycle (Short)</option>
                                <option value="Motor">Motor (Long)</option>
                            </select>
                        </div>
                        
                        <button onclick="dispatchOrder('${id}')" class="w-full bg-white text-black py-3 rounded-xl font-black text-[10px] mb-2 uppercase">Verify & Dispatch</button>
                        <button onclick="deleteOrder('${id}')" class="w-full text-red-500 text-[9px] font-bold uppercase tracking-widest opacity-40">Archive</button>
                    </div>`;
                
                setTimeout(() => initOrderMap(mapId), 100);
            });
            document.getElementById('sales').innerText = totalRev.toLocaleString();
            document.getElementById('totalOrders').innerText = totalOrd;
            document.getElementById('totalItems').innerText = totalItms;
        });

        function initOrderMap(id) {
            const map = L.map(id, {zoomControl:false, attributionControl:false}).setView(MOH_HUB, 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            const dest = [MOH_HUB[0]+(Math.random()-0.5)*0.03, MOH_HUB[1]+(Math.random()-0.5)*0.03];
            L.marker(MOH_HUB, {icon: L.divIcon({html:'<i class="fa-solid fa-mug-hot text-[#1DB954] text-lg"></i>'})}).addTo(map);
            L.marker(dest, {icon: L.divIcon({html:'<i class="fa-solid fa-location-dot text-blue-400 text-lg"></i>'})}).addTo(map);
            L.polyline([MOH_HUB, dest], {color: '#1DB954', weight: 3, opacity: 0.6, dashArray: '5, 10'}).addTo(map);
            map.fitBounds([MOH_HUB, dest], {padding: [20, 20]});
        }

        window.dispatchOrder = (id) => {
            const type = document.getElementById(`assign-${id}`).value;
            const courier = Object.values(globalFleet).find(f => f.type === type);
            if(!courier) return alert("No active courier for this vehicle type.");
            
            update(ref(db, `orders/${id}`), {
                status: "Dispatched",
                courier_name: courier.name,
                courier_photo: courier.photo 
            }).then(() => alert(`Verified! ${courier.name} is on the way via ${type}.`));
        };

        window.saveLog = () => {
            const text = document.getElementById('logText').value;
            if(!text) return;
            push(ref(db, 'logs'), { text, time: new Date().toLocaleString() });
            document.getElementById('logText').value = '';
        };

        onValue(ref(db, 'logs'), (s) => {
            const list = document.getElementById('log-list'); list.innerHTML = '';
            const data = s.val();
            if(data) Object.keys(data).reverse().forEach(id => {
                list.innerHTML += `<div class="bg-white/5 p-4 rounded-xl border border-white/5 flex justify-between items-center"><div class="text-xs"><b>${data[id].time}</b><br>${data[id].text}</div><button onclick="remove(ref(db, 'logs/${id}'))" class="text-red-500/20"><i class="fa-solid fa-trash"></i></button></div>`;
            });
        });

        window.deleteOrder = (id) => { if(confirm("Archive?")) remove(ref(db, `orders/${id}`)); };
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
