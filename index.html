<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOH COFFEE | Elite Control Center</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --spotify-green: #1DB954; --card-bg: rgba(20, 20, 20, 0.6); --glass-border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; color: #fff; margin: 0; background-color: #000; overflow-x: hidden; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; filter: brightness(0.2); }
        .glass-panel { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; }
        .order-card { background: rgba(24, 24, 24, 0.8); border-radius: 24px; padding: 20px; border: 1px solid var(--glass-border); transition: 0.3s; position: relative; overflow: hidden; }
        .order-card:hover { border-color: var(--spotify-green); transform: translateY(-5px); }
        .control-bar { background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); sticky; top: 0; z-index: 100; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .tab-btn { padding: 12px 24px; font-size: 11px; font-weight: 900; text-transform: uppercase; border-radius: 99px; cursor: pointer; transition: 0.3s; }
        .tab-active { background: var(--spotify-green); color: black; box-shadow: 0 0 20px rgba(29, 185, 84, 0.4); }
        .receipt-preview { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; cursor: pointer; margin-bottom: 15px; border: 1px solid #333; }
        .delivery-badge { position: absolute; top: 10px; right: 10px; font-size: 18px; }
        #map-container { height: 300px; border-radius: 20px; overflow: hidden; margin-top: 10px; border: 1px solid #333; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="custom-scrollbar">

    <video autoplay loop muted playsinline class="video-bg">
        <source src="background-video.mp4" type="video/mp4">
    </video>

    <div class="control-bar">
        <div class="flex items-center gap-4">
            <span class="text-spotGreen font-black text-xl tracking-tighter">MOH <span class="text-white">HQ</span></span>
            <span id="clock" class="text-xs font-mono opacity-60">00:00:00</span>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleCalculator()" class="bg-white/10 p-2 px-4 rounded-full text-[10px] font-bold uppercase"><i class="fa-solid fa-calculator mr-2"></i>Calc</button>
            <button onclick="toggleLanguage()" class="bg-white text-black p-2 px-4 rounded-full text-[10px] font-bold uppercase">AM/EN</button>
        </div>
    </div>

    <div id="app-container" class="max-w-7xl mx-auto p-6">
        <header class="py-10 flex flex-col md:flex-row justify-between items-end gap-6">
            <div>
                <h1 class="text-5xl font-900 tracking-tighter italic" data-i18n="welcome">COMMAND CENTER</h1>
                <p class="text-spotGreen text-[10px] uppercase font-bold tracking-[0.4em] mt-2">● Live Kitchen & Delivery Feed</p>
            </div>
            <div class="flex gap-4">
                <div class="glass-panel p-6 min-w-[160px] text-center">
                    <p class="text-[9px] font-black text-gray-500 uppercase mb-1" data-i18n="revenue">Verified Sales</p>
                    <span id="sales" class="text-3xl font-black text-spotGreen">0</span><span class="text-xs ml-1">ETB</span>
                </div>
                <div class="glass-panel p-6 min-w-[160px] text-center">
                    <p class="text-[9px] font-black text-gray-500 uppercase mb-1" data-i18n="activeUsers">Members</p>
                    <span id="userCount" class="text-3xl font-black text-blue-400">0</span>
                </div>
            </div>
        </header>

        <nav class="flex gap-3 mb-10 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn tab-active">Live Orders</button>
            <button onclick="switchTab('members')" id="btn-members" class="tab-btn bg-zinc-900 text-gray-500">Registered Members</button>
            <button onclick="switchTab('fleet')" id="btn-fleet" class="tab-btn bg-zinc-900 text-gray-500">Delivery Fleet</button>
            <button onclick="switchTab('map')" id="btn-map" class="tab-btn bg-zinc-900 text-gray-500">Goro Map</button>
        </nav>

        <main id="orders-section">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </main>

        <main id="members-section" class="hidden animate-in">
            <div class="glass-panel p-8">
                <h2 class="text-2xl font-black mb-8">CLIENT DATABASE</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="member-list"></div>
            </div>
        </main>

        <main id="fleet-section" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass-panel p-8 lg:col-span-1">
                    <h2 class="text-xl font-black mb-6 uppercase tracking-tighter text-spotGreen">Hire Courier</h2>
                    <div class="space-y-4">
                        <input type="text" id="fleetName" placeholder="Driver Name" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none focus:border-spotGreen transition">
                        <input type="tel" id="fleetPhone" placeholder="Phone Number" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none">
                        <select id="fleetType" class="w-full bg-black/40 p-4 rounded-xl border border-white/10 outline-none">
                            <option value="Bike">Bicycle (Short Range)</option>
                            <option value="Motorbike">Motorbike (Long Range)</option>
                        </select>
                        <input type="file" id="fleetPhoto" accept="image/*" class="text-xs text-gray-500">
                        <button onclick="registerCourier()" class="w-full bg-spotGreen text-black py-4 rounded-xl font-black uppercase tracking-widest hover:scale-105 transition">Register Courier</button>
                    </div>
                </div>
                <div class="lg:col-span-2 glass-panel p-8">
                    <h2 class="text-xl font-black mb-6 uppercase tracking-tighter">Active Fleet</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="fleet-list"></div>
                </div>
            </div>
        </main>

        <main id="map-section" class="hidden">
            <div class="glass-panel p-4 h-[600px] w-full relative">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15762.67812297839!2d38.86872585!3d9.002494!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x164b9ab06b0266e7%3A0x6d1152a55850901e!2sGoro%2C%20Addis%20Ababa!5e0!3m2!1sen!2set!4v1710000000000!5m2!1sen!2set" class="w-full h-full rounded-2xl grayscale contrast-125 invert opacity-80" allowfullscreen="" loading="lazy"></iframe>
                <div class="absolute top-10 left-10 bg-black/80 p-6 rounded-2xl border border-spotGreen/50 backdrop-blur-md">
                    <h3 class="font-black text-spotGreen">GORO OPERATIONS</h3>
                    <p class="text-[10px] text-gray-400">Deep Level Tracking Enabled</p>
                </div>
            </div>
        </main>
    </div>

    <div id="calc-app" class="glass-panel p-5 fixed bottom-10 right-10 w-80 z-[200] hidden">
        <input type="text" id="calc-display" class="w-full bg-black text-right text-3xl p-4 rounded-xl mb-4 font-mono text-spotGreen" disabled value="0">
        <div class="grid grid-cols-4 gap-2">
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('7')">7</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('8')">8</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('9')">9</button>
            <button class="bg-spotGreen text-black p-4 rounded-xl font-bold" onclick="calcAction('/')">÷</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('4')">4</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('5')">5</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('6')">6</button>
            <button class="bg-spotGreen text-black p-4 rounded-xl font-bold" onclick="calcAction('*')">×</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('1')">1</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('2')">2</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('3')">3</button>
            <button class="bg-spotGreen text-black p-4 rounded-xl font-bold" onclick="calcAction('-')">-</button>
            <button class="bg-white/5 p-4 rounded-xl" onclick="calcAction('0')">0</button>
            <button class="bg-red-900/40 text-red-500 p-4 rounded-xl" onclick="calcAction('clear')">C</button>
            <button class="bg-spotGreen text-black p-4 rounded-xl font-bold" onclick="calcAction('=')">=</button>
            <button class="bg-spotGreen text-black p-4 rounded-xl font-bold" onclick="calcAction('+')">+</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove, set, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjtvENDE6JD2gntFdTMuljt8ojaLyW_lg",
            authDomain: "moh-coffe.firebaseapp.com",
            databaseURL: "https://moh-coffe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "moh-coffe",
            appId: "1:257455436275:web:b6af25bbc61803b7a02286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CORE UI ---
        window.switchTab = (t) => {
            ['orders', 'members', 'fleet', 'map'].forEach(tab => {
                document.getElementById(`${tab}-section`).classList.toggle('hidden', tab !== t);
                document.getElementById(`btn-${tab}`).className = tab === t ? 'tab-btn tab-active' : 'tab-btn bg-zinc-900 text-gray-500';
            });
        };

        window.toggleCalculator = () => document.getElementById('calc-app').classList.toggle('hidden');

        // --- ORDER MANAGEMENT ---
        onValue(ref(db, 'orders'), (snapshot) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const data = snapshot.val();
            let revenue = 0;
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                if(o.status === "Paid") revenue += Number(o.price);
                
                // Prediction logic: Orders > 10 mins ago are flagged
                const timeDiff = Math.floor((Date.now() - o.timestamp) / 60000);
                const isLate = timeDiff > 15;

                grid.innerHTML += `
                    <div class="order-card animate-in ${isLate && o.status !== 'Paid' ? 'border-orange-500/50' : ''}">
                        <div class="delivery-badge">
                            ${o.location.length > 10 ? '<i class="fa-solid fa-motorcycle text-blue-400"></i>' : '<i class="fa-solid fa-bicycle text-spotGreen"></i>'}
                        </div>
                        
                        ${o.receipt ? `<img src="${o.receipt}" class="receipt-preview" onclick="window.open('${o.receipt}')" title="Click to enlarge">` : '<div class="h-[150px] bg-black/40 rounded-xl mb-4 flex items-center justify-center text-[10px] text-gray-600 font-bold uppercase">No Receipt Attached</div>'}
                        
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-black px-3 py-1 rounded-full ${o.status === 'Paid' ? 'bg-spotGreen text-black' : 'bg-white/10 text-white'}">${o.status}</span>
                            <span class="text-[10px] text-gray-500 font-mono">${new Date(o.timestamp).toLocaleTimeString()}</span>
                        </div>

                        <h3 class="text-xl font-black tracking-tight">${o.item}</h3>
                        <p class="text-xs text-spotGreen font-bold mb-4">${o.variant}</p>
                        
                        <div class="bg-black/50 p-4 rounded-2xl mb-4 border border-white/5">
                            <p class="text-xs font-black mb-1">${o.customer}</p>
                            <p class="text-[10px] text-gray-500 mb-2">${o.phone}</p>
                            <div class="flex items-center gap-2 text-blue-400 cursor-pointer hover:underline" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(o.location)}')">
                                <i class="fa-solid fa-location-dot text-[10px]"></i>
                                <span class="text-[10px] font-bold uppercase">${o.location}</span>
                            </div>
                        </div>

                        <div class="text-3xl font-black mb-6">${o.price} <span class="text-xs text-gray-500">ETB</span></div>
                        
                        <div class="flex gap-2">
                            <button onclick="markPaid('${id}')" class="flex-1 bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase">Verify Payment</button>
                            <button onclick="deleteOrder('${id}')" class="bg-red-500/20 text-red-500 px-4 rounded-xl"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('sales').innerText = revenue.toLocaleString();
        });

        // --- MEMBER MANAGEMENT ---
        onValue(ref(db, 'members'), (snapshot) => {
            const list = document.getElementById('member-list');
            list.innerHTML = '';
            const data = snapshot.val();
            if(!data) return;
            document.getElementById('userCount').innerText = Object.keys(data).length;

            Object.keys(data).forEach(id => {
                const m = data[id];
                list.innerHTML += `
                    <div class="bg-black/40 p-5 rounded-2xl border border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-spotGreen/20 rounded-full flex items-center justify-center text-spotGreen font-black">${m.name[0]}</div>
                            <div>
                                <p class="font-black text-sm">${m.name}</p>
                                <p class="text-xs text-gray-500 font-mono">${m.phone}</p>
                            </div>
                        </div>
                        <button onclick="archiveMember('${id}')" class="text-gray-600 hover:text-red-500 transition"><i class="fa-solid fa-folder-minus"></i></button>
                    </div>
                `;
            });
        });

        // --- FLEET (COURIER) LOGIC ---
        window.registerCourier = async () => {
            const name = document.getElementById('fleetName').value;
            const phone = document.getElementById('fleetPhone').value;
            const type = document.getElementById('fleetType').value;
            const fileInput = document.getElementById('fleetPhoto');

            if(!name || !phone) return alert("Fill all details");

            let photoBase64 = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
            if(fileInput.files[0]) {
                const reader = new FileReader();
                reader.readAsDataURL(fileInput.files[0]);
                await new Promise(r => reader.onload = () => { photoBase64 = reader.result; r(); });
            }

            const newFleetRef = push(ref(db, 'fleet'));
            await set(newFleetRef, { name, phone, type, photo: photoBase64 });
            alert("Courier Registered!");
            document.getElementById('fleetName').value = '';
        };

        onValue(ref(db, 'fleet'), (snapshot) => {
            const list = document.getElementById('fleet-list');
            list.innerHTML = '';
            const data = snapshot.val();
            if(!data) return;
            Object.keys(data).forEach(id => {
                const f = data[id];
                list.innerHTML += `
                    <div class="bg-black/60 p-4 rounded-2xl border border-white/10 flex items-center gap-4 group">
                        <img src="${f.photo}" class="w-16 h-16 rounded-xl object-cover border border-white/10">
                        <div class="flex-1">
                            <p class="font-black uppercase text-xs tracking-tighter">${f.name}</p>
                            <p class="text-[10px] text-spotGreen font-bold">${f.type} Delivery</p>
                            <p class="text-[10px] text-gray-500">${f.phone}</p>
                        </div>
                        <button onclick="removeFleet('${id}')" class="opacity-0 group-hover:opacity-100 p-2 text-red-500 transition"><i class="fa-solid fa-circle-xmark"></i></button>
                    </div>
                `;
            });
        });

        // --- ACTIONS ---
        window.markPaid = (id) => update(ref(db, `orders/${id}`), { status: "Paid" });
        window.deleteOrder = (id) => { if(confirm("Archive Order?")) remove(ref(db, `orders/${id}`)); };
        window.removeFleet = (id) => { if(confirm("Delete Courier?")) remove(ref(db, `fleet/${id}`)); };
        window.archiveMember = (id) => { if(confirm("Delete Member Record?")) remove(ref(db, `members/${id}`)); };

        // --- CALCULATOR ---
        let calcVal = "0";
        window.calcAction = (a) => {
            if(a === 'clear') calcVal = "0";
            else if(a === '=') try { calcVal = eval(calcVal).toString(); } catch { calcVal = "Error"; }
            else { calcVal = calcVal === "0" ? a : calcVal + a; }
            document.getElementById('calc-display').value = calcVal;
        };

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
