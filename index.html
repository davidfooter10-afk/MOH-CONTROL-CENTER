<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WELCOME MOH COFFEE CENTER</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --spotify-green: #1DB954; --card-bg: rgba(24, 24, 24, 0.9); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('bg-control.jpg');
            background-size: cover; background-attachment: fixed;
            color: #fff; font-family: 'Inter', sans-serif; 
            padding: 20px; min-height: 100vh; overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
        }

        .stat-card {
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .order-card {
            background: #181818;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .order-card:hover { border-color: var(--spotify-green); transform: scale(1.02); }

        .tab-btn {
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 99px;
            cursor: pointer;
        }
        .tab-active { background: var(--spotify-green); color: black; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="opacity-0 animate-in">

    <header class="max-w-6xl mx-auto py-10">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-5xl font-900 tracking-tighter italic mb-1">WELCOME MOH COFFEE CENTER</h1>
                <div class="flex items-center gap-3">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">System Live & Encrypted</p>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="glass-panel stat-card min-w-[120px]">
                    <p class="text-[9px] font-black text-gray-500 uppercase">Revenue</p>
                    <span id="sales" class="text-xl font-black text-spotGreen">0</span><span class="text-[10px] ml-1">ETB</span>
                </div>
                <div class="glass-panel stat-card min-w-[120px]">
                    <p class="text-[9px] font-black text-gray-500 uppercase">Active Users</p>
                    <span id="userCount" class="text-xl font-black text-blue-400">0</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="flex gap-4 max-w-6xl mx-auto mb-10 border-b border-white/5 pb-4">
        <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn tab-active">Orders Feed</button>
        <button onclick="switchTab('members')" id="btn-members" class="tab-btn bg-zinc-900 text-gray-400">Registered Members</button>
    </nav>

    <main id="orders-section" class="max-w-6xl mx-auto">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-20">
            </div>
    </main>

    <main id="members-section" class="max-w-6xl mx-auto hidden">
        <div class="glass-panel p-8">
            <h2 class="text-2xl font-black mb-6">MEMBER DIRECTORY</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[10px] uppercase text-gray-500 border-b border-white/5">
                            <th class="pb-4">Name</th>
                            <th class="pb-4">Phone</th>
                            <th class="pb-4">Status</th>
                            <th class="pb-4">Joined</th>
                        </tr>
                    </thead>
                    <tbody id="member-list" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjtvENDE6JD2gntFdTMuljt8ojaLyW_lg",
            authDomain: "moh-coffe.firebaseapp.com",
            databaseURL: "https://moh-coffe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "moh-coffe",
            appId: "1:257455436275:web:b6af25bbc61803b7a02286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // TAB SWITCHING LOGIC
        window.switchTab = (tab) => {
            const sections = ['orders', 'members'];
            sections.forEach(s => {
                document.getElementById(`${s}-section`).classList.add('hidden');
                document.getElementById(`btn-${s}`).classList.remove('tab-active', 'bg-zinc-900', 'text-gray-400');
            });
            document.getElementById(`${tab}-section`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
        };

        // ORDERS & ANALYTICS
        onValue(ref(db, 'orders'), (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('grid');
            const salesEl = document.getElementById('sales');
            const userCountEl = document.getElementById('userCount');
            
            grid.innerHTML = '';
            let totalSales = 0;
            let uniqueUsers = new Set();

            if (data) {
                Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp).forEach(id => {
                    const o = data[id];
                    if(o.status === "Paid") totalSales += Number(o.price);
                    if(o.phone) uniqueUsers.add(o.phone);

                    grid.innerHTML += `
                        <div class="order-card animate-in">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[9px] font-black px-3 py-1 rounded-full ${o.status === 'Pending' ? 'bg-yellow-500/10 text-yellow-500' : 'bg-green-500/10 text-green-500'}">${o.status}</span>
                                <span class="text-[9px] text-gray-500">${new Date(o.timestamp).toLocaleTimeString()}</span>
                            </div>
                            <h3 class="text-xl font-black">${o.item}</h3>
                            <p class="text-xs text-gray-400 mb-6">${o.variant} • ${o.location}</p>
                            <div class="flex items-center gap-3 mb-6 bg-white/5 p-3 rounded-xl">
                                <div class="w-8 h-8 bg-zinc-800 rounded-full flex items-center justify-center text-[10px] font-bold">
                                    ${o.customer.charAt(0)}
                                </div>
                                <div>
                                    <p class="text-xs font-bold">${o.customer}</p>
                                    <p class="text-[10px] text-gray-500">${o.phone || 'Walk-in'}</p>
                                </div>
                            </div>
                            <div class="text-2xl font-black mb-4">${o.price} <span class="text-xs font-normal text-gray-500">ETB</span></div>
                            <button onclick="markPaid('${id}')" class="w-full bg-white text-black text-[10px] font-black py-3 rounded-full hover:scale-105 transition active:scale-95 uppercase">Confirm Payment</button>
                            <button onclick="deleteOrder('${id}')" class="w-full text-[8px] font-bold text-gray-600 mt-4 uppercase tracking-tighter hover:text-red-500">Archive Order</button>
                        </div>
                    `;
                });
            }
            salesEl.innerText = totalSales.toLocaleString();
            userCountEl.innerText = uniqueUsers.size;
        });

        // MEMBERS LIST
        onValue(ref(db, 'members'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('member-list');
            list.innerHTML = '';
            if(data) {
                Object.values(data).forEach(m => {
                    list.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition">
                            <td class="py-4 font-bold">${m.name}</td>
                            <td class="py-4 text-gray-400">${m.phone}</td>
                            <td class="py-4"><span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded">MEMBER</span></td>
                            <td class="py-4 text-gray-500 text-xs">${m.date || 'N/A'}</td>
                        </tr>
                    `;
                });
            }
        });

        window.markPaid = (id) => update(ref(db, `orders/${id}`), { status: "Paid" });
        window.deleteOrder = (id) => { if(confirm("Archive this order?")) remove(ref(db, `orders/${id}`)); };

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</body>
</html>
