<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOH COFFEE Control Center</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --spotify-green: #1DB954; 
            --card-bg: rgba(20, 20, 20, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #000;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Fallback Background */
        .fallback-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('bg-control.jpg');
            background-size: cover; background-position: center;
            z-index: -2;
        }

        /* App Container (For Device Toggle) */
        #app-container {
            min-height: 100vh;
            padding: 20px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            margin: 0 auto;
        }

        /* Phone Mode Styles */
        .phone-mode {
            max-width: 400px !important;
            height: 850px;
            margin-top: 20px !important;
            border-radius: 40px;
            border: 12px solid #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 10px rgba(255,255,255,0.1);
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            position: relative;
        }
        .phone-mode::-webkit-scrollbar { display: none; }

        /* Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-in { animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-card {
            padding: 20px; text-align: center; transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.3); }

        .order-card {
            background: rgba(24, 24, 24, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.4s ease;
        }
        .order-card:hover { 
            border-color: var(--spotify-green); 
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(29, 185, 84, 0.15);
        }

        /* Top Control Bar */
        .control-bar {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 50;
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 8px 16px; border-radius: 99px;
            font-size: 12px; font-weight: bold; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .action-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }

        .tab-btn {
            padding: 10px 20px; font-size: 12px; font-weight: 900;
            text-transform: uppercase; border-radius: 99px; cursor: pointer;
            transition: 0.3s;
        }
        .tab-active { background: var(--spotify-green); color: black; box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }

        /* Calculator App Modal */
        #calc-app {
            position: fixed; bottom: 20px; right: 20px;
            width: 300px; z-index: 100;
            transform: translateY(150%) scale(0.9); opacity: 0;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none;
        }
        #calc-app.show { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
        
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { 
            background: rgba(255,255,255,0.1); border: none; padding: 15px; 
            border-radius: 12px; color: white; font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .calc-btn:hover { background: rgba(255,255,255,0.2); }
        .calc-btn.op { background: var(--spotify-green); color: black; font-weight: bold; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="fallback-bg"></div>
    
    <video autoplay loop muted playsinline class="video-bg" poster="bg-control.jpg">
        <source src="background-video.mp4" type="video/mp4">
    </video>

    <div class="control-bar">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-signal text-xs"></i>
            <i class="fa-solid fa-wifi text-xs"></i>
            <span id="clock" class="text-xs font-bold tracking-wider">00:00</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDeviceView()" class="action-btn" title="Toggle Phone/Laptop">
                <i class="fa-solid fa-mobile-screen-button"></i> <span class="hidden md:inline" data-i18n="deviceView">View</span>
            </button>
            <button onclick="toggleCalculator()" class="action-btn">
                <i class="fa-solid fa-calculator"></i> <span class="hidden md:inline" data-i18n="calculator">Calc</span>
            </button>
            <button onclick="toggleLanguage()" class="action-btn bg-white text-black hover:bg-gray-200">
                <i class="fa-solid fa-language"></i> <span id="lang-indicator">AM/EN</span>
            </button>
        </div>
    </div>

    <div id="app-container" class="max-w-6xl">
        <header class="py-10 animate-in">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                <div>
                    <h1 class="text-4xl md:text-5xl font-900 tracking-tighter italic mb-1" data-i18n="welcome">WELCOME MOH COFFEE CENTER</h1>
                    <div class="flex items-center gap-3">
                        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#1DB954]"></span>
                        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest" data-i18n="systemLive">System Live & Encrypted</p>
                    </div>
                </div>
                
                <div class="flex gap-4 w-full md:w-auto overflow-x-auto pb-2 md:pb-0">
                    <div class="glass-panel stat-card min-w-[140px] flex-1">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-wider" data-i18n="revenue">Revenue</p>
                        <span id="sales" class="text-2xl font-black text-[#1DB954]">0</span><span class="text-[10px] ml-1 text-gray-500">ETB</span>
                    </div>
                    <div class="glass-panel stat-card min-w-[140px] flex-1">
                        <p class="text-[9px] font-black text-gray-400 uppercase tracking-wider" data-i18n="activeUsers">Active Users</p>
                        <span id="userCount" class="text-2xl font-black text-blue-400">0</span>
                    </div>
                </div>
            </div>
        </header>

        <nav class="flex gap-4 mb-8 border-b border-white/10 pb-4 animate-in overflow-x-auto" style="animation-delay: 0.1s;">
            <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn tab-active" data-i18n="ordersFeed">Orders Feed</button>
            <button onclick="switchTab('members')" id="btn-members" class="tab-btn bg-zinc-900/50 text-gray-400" data-i18n="registeredMembers">Registered Members</button>
        </nav>

        <main id="orders-section">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
                </div>
        </main>

        <main id="members-section" class="hidden">
            <div class="glass-panel p-6 md:p-8 animate-in" style="animation-delay: 0.2s;">
                <h2 class="text-2xl font-black mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-users text-[#1DB954]"></i> 
                    <span data-i18n="memberDirectory">MEMBER DIRECTORY</span>
                </h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] uppercase text-gray-400 border-b border-white/10">
                                <th class="pb-4" data-i18n="name">Name</th>
                                <th class="pb-4" data-i18n="phone">Phone</th>
                                <th class="pb-4" data-i18n="status">Status</th>
                                <th class="pb-4" data-i18n="joined">Joined</th>
                            </tr>
                        </thead>
                        <tbody id="member-list" class="text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="calc-app" class="glass-panel p-5">
        <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
            <span class="font-bold text-sm tracking-widest"><i class="fa-solid fa-calculator mr-2"></i>MOH CALC</span>
            <button onclick="toggleCalculator()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-times"></i></button>
        </div>
        <input type="text" id="calc-display" class="w-full bg-black/50 text-right text-2xl font-black p-3 rounded-xl mb-4 text-white outline-none border border-white/5" disabled value="0">
        <div class="calc-grid">
            <button class="calc-btn text-red-400" onclick="calcAction('clear')">C</button>
            <button class="calc-btn" onclick="calcAction('(')">(</button>
            <button class="calc-btn" onclick="calcAction(')')">)</button>
            <button class="calc-btn op" onclick="calcAction('/')">÷</button>
            
            <button class="calc-btn" onclick="calcAction('7')">7</button>
            <button class="calc-btn" onclick="calcAction('8')">8</button>
            <button class="calc-btn" onclick="calcAction('9')">9</button>
            <button class="calc-btn op" onclick="calcAction('*')">×</button>
            
            <button class="calc-btn" onclick="calcAction('4')">4</button>
            <button class="calc-btn" onclick="calcAction('5')">5</button>
            <button class="calc-btn" onclick="calcAction('6')">6</button>
            <button class="calc-btn op" onclick="calcAction('-')">-</button>
            
            <button class="calc-btn" onclick="calcAction('1')">1</button>
            <button class="calc-btn" onclick="calcAction('2')">2</button>
            <button class="calc-btn" onclick="calcAction('3')">3</button>
            <button class="calc-btn op" onclick="calcAction('+')">+</button>
            
            <button class="calc-btn" onclick="calcAction('0')">0</button>
            <button class="calc-btn" onclick="calcAction('.')">.</button>
            <button class="calc-btn text-red-400" onclick="calcAction('del')"><i class="fa-solid fa-delete-left"></i></button>
            <button class="calc-btn op" onclick="calcAction('=')">=</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjtvENDE6JD2gntFdTMuljt8ojaLyW_lg",
            authDomain: "moh-coffe.firebaseapp.com",
            databaseURL: "https://moh-coffe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "moh-coffe",
            appId: "1:257455436275:web:b6af25bbc61803b7a02286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LANGUAGE LOGIC ---
        let currentLang = 'en';
        const dictionary = {
            'en': {
                welcome: "WELCOME MOH COFFEE CENTER", systemLive: "System Live & Encrypted",
                revenue: "Revenue", activeUsers: "Active Users", ordersFeed: "Orders Feed",
                registeredMembers: "Registered Members", memberDirectory: "MEMBER DIRECTORY",
                name: "Name", phone: "Phone", status: "Status", joined: "Joined",
                confirmPayment: "Confirm Payment", archiveOrder: "Archive Order",
                deviceView: "View", calculator: "Calc", walkIn: "Walk-in"
            },
            'am': {
                welcome: "እንኳን ወደ ሞህ ቡና ማዕከል በደህና መጡ", systemLive: "ስርዓቱ በቀጥታ እና ሚስጥራዊ ነው",
                revenue: "ገቢ", activeUsers: "ንቁ ተጠቃሚዎች", ordersFeed: "የትዕዛዝ ዝርዝር",
                registeredMembers: "የተመዘገቡ አባላት", memberDirectory: "የአባላት ማውጫ",
                name: "ስም", phone: "ስልክ", status: "ሁኔታ", joined: "የተቀላቀለበት",
                confirmPayment: "ክፍያ አረጋግጥ", archiveOrder: "ትዕዛዝ መዝገብ (አጥፋ)",
                deviceView: "እይታ", calculator: "ካስዮ", walkIn: "በአካል"
            }
        };

        window.toggleLanguage = () => {
            currentLang = currentLang === 'en' ? 'am' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(dictionary[currentLang][key]) {
                    el.innerText = dictionary[currentLang][key];
                }
            });
            // Trigger firebase redraw to update dynamic buttons
            renderOrders(cachedOrders); 
        };

        const t = (key) => dictionary[currentLang][key] || key;

        // --- DEVICE VIEW LOGIC ---
        window.toggleDeviceView = () => {
            document.getElementById('app-container').classList.toggle('phone-mode');
        };

        // --- CALCULATOR LOGIC ---
        let calcDisplay = "0";
        window.toggleCalculator = () => {
            document.getElementById('calc-app').classList.toggle('show');
        };
        
        window.calcAction = (action) => {
            const displayEl = document.getElementById('calc-display');
            if(action === 'clear') { calcDisplay = "0"; }
            else if(action === 'del') { 
                calcDisplay = calcDisplay.length > 1 ? calcDisplay.slice(0, -1) : "0"; 
            }
            else if(action === '=') {
                try { calcDisplay = eval(calcDisplay).toString(); } 
                catch(e) { calcDisplay = "Error"; }
            }
            else {
                if(calcDisplay === "0" || calcDisplay === "Error") calcDisplay = action;
                else calcDisplay += action;
            }
            displayEl.value = calcDisplay;
        };

        // --- TAB SWITCHING LOGIC ---
        window.switchTab = (tab) => {
            const sections = ['orders', 'members'];
            sections.forEach(s => {
                document.getElementById(`${s}-section`).classList.add('hidden');
                document.getElementById(`btn-${s}`).classList.remove('tab-active', 'bg-zinc-900/50', 'text-gray-400');
            });
            document.getElementById(`${tab}-section`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('tab-active');
            if(tab === 'members') document.getElementById('btn-orders').classList.add('bg-zinc-900/50', 'text-gray-400');
            if(tab === 'orders') document.getElementById('btn-members').classList.add('bg-zinc-900/50', 'text-gray-400');
        };

        // --- TIME LOGIC ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // --- ORDERS & ANALYTICS ---
        let cachedOrders = null;
        
        const renderOrders = (data) => {
            if(!data) return;
            const grid = document.getElementById('grid');
            const salesEl = document.getElementById('sales');
            const userCountEl = document.getElementById('userCount');
            
            grid.innerHTML = '';
            let totalSales = 0;
            let uniqueUsers = new Set();

            Object.keys(data).sort((a,b) => data[b].timestamp - data[a].timestamp).forEach((id, index) => {
                const o = data[id];
                if(o.status === "Paid") totalSales += Number(o.price);
                if(o.phone) uniqueUsers.add(o.phone);

                const delay = index * 0.05; // Staggered animation

                grid.innerHTML += `
                    <div class="order-card animate-in" style="animation-delay: ${delay}s">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black px-3 py-1 rounded-full ${o.status === 'Pending' ? 'bg-yellow-500/20 text-yellow-400 border border-yellow-500/30' : 'bg-green-500/20 text-green-400 border border-green-500/30'}">${o.status}</span>
                            <span class="text-[9px] text-gray-400 bg-black/50 px-2 py-1 rounded-md border border-white/5 shadow-inner">${new Date(o.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <h3 class="text-xl font-black mb-1">${o.item}</h3>
                        <p class="text-xs text-[#1DB954] mb-4 font-bold tracking-wide">${o.variant} • ${o.location}</p>
                        
                        <div class="flex items-center gap-3 mb-5 bg-black/40 border border-white/5 p-3 rounded-xl backdrop-blur-sm">
                            <div class="w-10 h-10 bg-gradient-to-br from-zinc-700 to-zinc-900 rounded-full flex items-center justify-center text-[12px] font-black shadow-lg border border-white/10">
                                ${o.customer.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-white">${o.customer}</p>
                                <p class="text-[10px] text-gray-400 font-mono tracking-widest">${o.phone || t('walkIn')}</p>
                            </div>
                        </div>
                        
                        <div class="flex items-end gap-1 mb-5">
                            <div class="text-3xl font-black tracking-tighter">${o.price}</div>
                            <div class="text-[10px] font-bold text-gray-500 mb-1">ETB</div>
                        </div>
                        
                        <button onclick="markPaid('${id}')" class="w-full bg-white text-black text-[11px] font-black py-3 rounded-xl hover:bg-[#1DB954] hover:text-white transition-all shadow-[0_4px_15px_rgba(255,255,255,0.1)] active:scale-95 uppercase tracking-wider mb-3">
                            <i class="fa-solid fa-check-circle mr-1"></i> ${t('confirmPayment')}
                        </button>
                        <button onclick="deleteOrder('${id}')" class="w-full bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] font-bold py-2 rounded-xl uppercase tracking-widest hover:bg-red-500 hover:text-white transition-colors">
                            <i class="fa-solid fa-trash mr-1"></i> ${t('archiveOrder')}
                        </button>
                    </div>
                `;
            });
            salesEl.innerText = totalSales.toLocaleString();
            userCountEl.innerText = uniqueUsers.size;
        };

        onValue(ref(db, 'orders'), (snapshot) => {
            cachedOrders = snapshot.val();
            renderOrders(cachedOrders);
        });

        // --- MEMBERS LIST ---
        onValue(ref(db, 'members'), (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('member-list');
            list.innerHTML = '';
            if(data) {
                Object.values(data).forEach((m, i) => {
                    list.innerHTML += `
                        <tr class="border-b border-white/5 hover:bg-white/5 transition animate-in" style="animation-delay: ${i * 0.05}s">
                            <td class="py-4 font-bold flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-[10px] border border-white/10">${m.name.charAt(0)}</div>
                                ${m.name}
                            </td>
                            <td class="py-4 text-gray-400 font-mono text-xs">${m.phone}</td>
                            <td class="py-4"><span class="text-[9px] font-bold tracking-widest bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-1 rounded-md">MEMBER</span></td>
                            <td class="py-4 text-gray-500 text-xs">${m.date || 'N/A'}</td>
                        </tr>
                    `;
                });
            }
        });

        window.markPaid = (id) => update(ref(db, `orders/${id}`), { status: "Paid" });
        window.deleteOrder = (id) => { if(confirm("Archive this order?")) remove(ref(db, `orders/${id}`)); };

        if ('serviceWorker' in navigator) { 
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</body>
</html>
