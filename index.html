<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOH COFFEE Control Center</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1DB954">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --spotify-green: #1DB954; 
            --card-bg: rgba(20, 20, 20, 0.4); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            color: #fff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background-color: #000;
        }

        .video-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.3) contrast(1.2);
        }

        .fallback-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('bg-control.jpg');
            background-size: cover; background-position: center;
            z-index: -2;
        }

        #app-container {
            min-height: 100vh;
            padding: 20px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            margin: 0 auto;
        }

        .phone-mode {
            max-width: 400px !important;
            height: 850px;
            margin: 20px auto !important;
            border-radius: 40px;
            border: 12px solid #111;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-in { animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
        }

        .stat-card { padding: 20px; text-align: center; }

        .order-card {
            background: rgba(24, 24, 24, 0.7);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.3s ease;
        }
        .order-card:hover { border-color: var(--spotify-green); transform: translateY(-5px); }

        .control-bar {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 50;
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px; border-radius: 99px;
            font-size: 11px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }

        .tab-btn {
            padding: 10px 20px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; border-radius: 99px; cursor: pointer;
        }
        .tab-active { background: var(--spotify-green); color: black; }

        #calc-app {
            position: fixed; bottom: 20px; right: 20px;
            width: 300px; z-index: 100;
            transform: translateY(150%); opacity: 0;
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #calc-app.show { transform: translateY(0); opacity: 1; }
        
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: white; cursor: pointer; }
        .calc-btn.op { background: var(--spotify-green); color: black; font-weight: bold; }
    </style>
</head>
<body>

    <div class="fallback-bg"></div>
    <video autoplay loop muted playsinline class="video-bg">
        <source src="background-video.mp4" type="video/mp4">
    </video>

    <div class="control-bar">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-wifi text-xs"></i>
            <span id="clock" class="text-xs font-bold">00:00</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDeviceView()" class="action-btn"><i class="fa-solid fa-mobile-screen"></i> <span>VIEW</span></button>
            <button onclick="toggleCalculator()" class="action-btn"><i class="fa-solid fa-calculator"></i> <span>CALC</span></button>
            <button onclick="toggleLanguage()" class="action-btn bg-white text-black"><i class="fa-solid fa-language"></i> <span>AM/EN</span></button>
        </div>
    </div>

    <div id="app-container" class="max-w-6xl">
        <header class="py-10 animate-in">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-4xl md:text-5xl font-900 tracking-tighter italic" data-i18n="welcome">WELCOME MOH COFFEE CENTER</h1>
                    <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mt-2" data-i18n="systemLive">● System Live & Secure</p>
                </div>
                <div class="flex gap-4">
                    <div class="glass-panel stat-card min-w-[130px]">
                        <p class="text-[9px] font-black text-gray-400 uppercase" data-i18n="revenue">Revenue</p>
                        <span id="sales" class="text-2xl font-black text-[#1DB954]">0</span><span class="text-[10px] ml-1">ETB</span>
                    </div>
                    <div class="glass-panel stat-card min-w-[130px]">
                        <p class="text-[9px] font-black text-gray-400 uppercase" data-i18n="activeUsers">Active Users</p>
                        <span id="userCount" class="text-2xl font-black text-blue-400">0</span>
                    </div>
                </div>
            </div>
        </header>

        <nav class="flex gap-4 mb-8 border-b border-white/10 pb-4">
            <button onclick="switchTab('orders')" id="btn-orders" class="tab-btn tab-active" data-i18n="ordersFeed">Orders</button>
            <button onclick="switchTab('members')" id="btn-members" class="tab-btn bg-zinc-900 text-gray-400" data-i18n="registeredMembers">Members</button>
        </nav>

        <main id="orders-section">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
        </main>

        <main id="members-section" class="hidden">
            <div class="glass-panel p-6">
                <h2 class="text-xl font-black mb-6" data-i18n="memberDirectory">MEMBER DIRECTORY</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <tbody id="member-list" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="calc-app" class="glass-panel p-5">
        <input type="text" id="calc-display" class="w-full bg-black/50 text-right text-2xl p-3 rounded-xl mb-4 font-mono" disabled value="0">
        <div class="calc-grid">
            <button class="calc-btn" onclick="calcAction('7')">7</button>
            <button class="calc-btn" onclick="calcAction('8')">8</button>
            <button class="calc-btn" onclick="calcAction('9')">9</button>
            <button class="calc-btn op" onclick="calcAction('/')">÷</button>
            <button class="calc-btn" onclick="calcAction('4')">4</button>
            <button class="calc-btn" onclick="calcAction('5')">5</button>
            <button class="calc-btn" onclick="calcAction('6')">6</button>
            <button class="calc-btn op" onclick="calcAction('*')">×</button>
            <button class="calc-btn" onclick="calcAction('1')">1</button>
            <button class="calc-btn" onclick="calcAction('2')">2</button>
            <button class="calc-btn" onclick="calcAction('3')">3</button>
            <button class="calc-btn op" onclick="calcAction('-')">-</button>
            <button class="calc-btn" onclick="calcAction('0')">0</button>
            <button class="calc-btn text-red-500" onclick="calcAction('clear')">C</button>
            <button class="calc-btn op" onclick="calcAction('=')">=</button>
            <button class="calc-btn op" onclick="calcAction('+')">+</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDjtvENDE6JD2gntFdTMuljt8ojaLyW_lg",
            authDomain: "moh-coffe.firebaseapp.com",
            databaseURL: "https://moh-coffe-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "moh-coffe",
            appId: "1:257455436275:web:b6af25bbc61803b7a02286"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- TRANSLATION ---
        let lang = 'en';
        const dict = {
            'en': { welcome: "WELCOME MOH COFFEE CENTER", revenue: "Revenue", activeUsers: "Active Users", ordersFeed: "Orders", registeredMembers: "Members", memberDirectory: "MEMBER DIRECTORY", systemLive: "● System Live & Secure" },
            'am': { welcome: "እንኳን ወደ ሞህ ቡና ማዕከል በደህና መጡ", revenue: "ጠቅላላ ገቢ", activeUsers: "ተጠቃሚዎች", ordersFeed: "ትዕዛዞች", registeredMembers: "አባላት", memberDirectory: "የአባላት ዝርዝር", systemLive: "● ሲስተሙ እየሰራ ነው" }
        };

        window.toggleLanguage = () => {
            lang = lang === 'en' ? 'am' : 'en';
            document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = dict[lang][el.getAttribute('data-i18n')]);
            if(lastSnap) render(lastSnap);
        };

        // --- UI ACTIONS ---
        window.toggleDeviceView = () => document.getElementById('app-container').classList.toggle('phone-mode');
        window.toggleCalculator = () => document.getElementById('calc-app').classList.toggle('show');
        window.switchTab = (t) => {
            document.getElementById('orders-section').classList.toggle('hidden', t !== 'orders');
            document.getElementById('members-section').classList.toggle('hidden', t !== 'members');
            document.getElementById('btn-orders').className = t === 'orders' ? 'tab-btn tab-active' : 'tab-btn bg-zinc-900 text-gray-400';
            document.getElementById('btn-members').className = t === 'members' ? 'tab-btn tab-active' : 'tab-btn bg-zinc-900 text-gray-400';
        };

        // --- CALC ---
        let val = "0";
        window.calcAction = (a) => {
            if(a === 'clear') val = "0";
            else if(a === '=') try { val = eval(val).toString(); } catch { val = "Error"; }
            else { val = val === "0" ? a : val + a; }
            document.getElementById('calc-display').value = val;
        };

        // --- FIREBASE LOGIC ---
        let lastSnap = null;
        const render = (data) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let total = 0; let users = new Set();
            if(!data) return;
            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                if(o.status === "Paid") total += Number(o.price);
                if(o.phone) users.add(o.phone);
                grid.innerHTML += `
                    <div class="order-card animate-in">
                        <div class="flex justify-between mb-4">
                            <span class="text-[9px] font-bold px-2 py-1 rounded bg-black/40 border border-white/10">${o.status}</span>
                            <span class="text-[9px] text-gray-500">${new Date(o.timestamp).toLocaleTimeString()}</span>
                        </div>
                        <h3 class="text-lg font-black">${o.item}</h3>
                        <p class="text-[11px] text-[#1DB954] mb-3 font-bold">${o.variant} • ${o.location}</p>
                        <div class="bg-black/30 p-3 rounded-xl mb-4">
                            <p class="text-xs font-bold">${o.customer}</p>
                            <p class="text-[10px] text-gray-500">${o.phone || (lang === 'en' ? 'Walk-in' : 'በአካል')}</p>
                        </div>
                        <div class="text-2xl font-black mb-4">${o.price} ETB</div>
                        <button onclick="markPaid('${id}')" class="w-full bg-white text-black py-2 rounded-xl font-bold text-[11px] mb-2 uppercase">Confirm</button>
                        <button onclick="deleteOrder('${id}')" class="w-full text-red-500 text-[9px] font-bold uppercase tracking-widest">Archive</button>
                    </div>`;
            });
            document.getElementById('sales').innerText = total.toLocaleString();
            document.getElementById('userCount').innerText = users.size;
        };

        onValue(ref(db, 'orders'), (s) => { lastSnap = s.val(); render(lastSnap); });

        onValue(ref(db, 'members'), (s) => {
            const list = document.getElementById('member-list');
            list.innerHTML = '';
            const data = s.val();
            if(data) {
                Object.values(data).forEach(m => {
                    list.innerHTML += `<tr class="border-b border-white/5"><td class="py-4 font-bold">${m.name}</td><td class="py-4 text-gray-400 font-mono text-xs">${m.phone}</td></tr>`;
                });
            }
        });

        window.markPaid = (id) => update(ref(db, `orders/${id}`), { status: "Paid" });
        window.deleteOrder = (id) => { if(confirm("Archive?")) remove(ref(db, `orders/${id}`)); };
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
